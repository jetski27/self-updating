# Secondary launcher used by jpackage --add-launcher.
# Points the app's primary launcher at our update4j bootstrap (launcher.jar) so the
# update check runs before Quarkus starts.
main-jar=launcher.jar
main-class=com.example.myapp.launcher.Launcher
java-options=-Dapp.home=$APPDATA/MyApp -Dgithub.owner=jetski27 -Dgithub.repo=self-updating
win-console=false
