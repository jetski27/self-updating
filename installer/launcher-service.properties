# Add-launcher properties for the PoS Agent service.
#
# jpackage --add-launcher "PoS Agent Service"=this-file produces a sibling
# launcher exe alongside the main GUI one, registers it as a Windows service
# during MSI install (Start=auto, Account=LocalSystem, ServiceControl
# Start=install), and starts it as the last step of the installer.
#
# launcher-as-service=true tells jpackage to wire up the WiX service template
# (service-install.wxi + service-config.wxi). The launcher is invoked under
# an NSSM-equivalent supervisor that handles SCM integration so our Java
# code doesn't need to know anything about Windows services.
#
# win-shortcut/win-menu=false keep this launcher off the Start Menu — only
# the interactive 'PoS Agent.exe' should be user-facing.
#
# -Dpos.service=true is the flag the launcher checks to skip the Swing
# splash and the browser auto-open (Session 0 has no display).
launcher-as-service=true
win-console=false
win-shortcut=false
win-menu=false
java-options=-Dpos.service=true
