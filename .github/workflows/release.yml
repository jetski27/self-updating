name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: app/frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('app/frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release distribution
        shell: bash
        run: scripts/build-release.sh "${{ steps.ver.outputs.version }}"

      - name: Build service zip
        shell: bash
        run: scripts/build-service-zip.sh "${{ steps.ver.outputs.version }}"

      - name: Verify release
        shell: bash
        run: scripts/verify-release.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # dist/* are the update4j-managed payload entries referenced by
          # config.xml — used for delta updates after first install.
          # installer/output/posagent-service-*.zip is the bootstrap
          # distribution: extract on a Windows box with Java 21+, run
          # install-service.bat as admin, done.
          files: |
            dist/config.xml
            dist/quarkus-run.jar
            dist/launcher.jar
            dist/quarkus-app-dependencies.txt
            dist/app/**
            dist/lib/**
            dist/quarkus/**
            installer/output/posagent-service-*.zip
