quarkus.application.name=myapp
quarkus.application.version=${project.version}

# Quinoa — Vite + React frontend lives in app/frontend, build output in dist/
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.package-manager-install.node-version=20.11.0
quarkus.quinoa.ui-dir=frontend
quarkus.quinoa.build-dir=dist
quarkus.quinoa.dev-server.port=5173

# App config — overridden at runtime by the launcher's -Dapp.home=...
app.home=${user.home}/.myapp
app.github.owner=jetski27
app.github.repo=self-updating

quarkus.http.port=8080
quarkus.log.level=INFO
quarkus.log.file.enable=true
quarkus.log.file.path=${app.home}/logs/myapp.log
quarkus.log.file.rotation.max-file-size=5M
quarkus.log.file.rotation.max-backup-index=3
